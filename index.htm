<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午夜監控：控制置頂版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        :root {
            --crt-red: #ff3e3e;
            --crt-green: #3eff3e;
        }

        body {
            background-color: #050505;
            color: var(--crt-green);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .camera-feed {
            filter: contrast(1.3) brightness(0.9);
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .danger-flash {
            animation: danger-pulse 1s infinite;
        }

        @keyframes danger-pulse {
            0%, 100% { box-shadow: inset 0 0 0px red; border-color: #333; }
            50% { box-shadow: inset 0 0 100px red; border-color: red; }
        }

        .btn-game {
            transition: all 0.2s;
            border: 2px solid var(--crt-green);
            background: rgba(0, 40, 0, 0.8);
            font-weight: bold;
        }
        .btn-game:hover { background: var(--crt-green); color: black; transform: translateY(-2px); }
        .btn-active { background: var(--crt-green); color: black; box-shadow: 0 0 15px var(--crt-green); }
        
        .btn-door {
            border-color: #71717a;
            color: #71717a;
        }
        .btn-door.active { 
            background: var(--crt-red); 
            color: white; 
            border-color: white;
            box-shadow: 0 0 20px var(--crt-red);
        }

        #jumpscare {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="crt">

<div id="game-ui" class="h-screen w-screen flex flex-col hidden">
    
    <!-- 頂部控制面板 (HUD) -->
    <div class="bg-zinc-900/90 border-b-2 border-green-900 p-4 grid grid-cols-3 gap-4 z-30 shadow-2xl">
        <!-- 左側：電力資訊 -->
        <div class="flex flex-col justify-center">
            <div class="text-xl font-bold flex items-center gap-2">
                ⚡ 電力: <span id="power" class="text-white text-2xl">100</span>%
            </div>
            <div id="usage-display" class="flex gap-1 mt-1 text-xs uppercase opacity-80 text-white">
                消耗速度: <span id="usage-bars" class="font-bold">▶</span>
            </div>
        </div>

        <!-- 中間：大門防禦 (最醒目位置) -->
        <div class="flex flex-col items-center justify-center">
            <div class="text-[10px] text-zinc-500 mb-1 uppercase tracking-widest font-bold">緊急防禦系統</div>
            <button onclick="toggleDoor()" id="door-btn" class="btn-game btn-door w-full py-3 rounded-lg text-xl uppercase">
                大門：開啟中
            </button>
        </div>

        <!-- 右側：時間與監控切換 -->
        <div class="flex flex-col items-end justify-center">
            <div class="text-2xl font-bold text-white mb-2" id="clock">12:00 AM</div>
            <div class="flex gap-1">
                <button onclick="switchCam(0)" id="cam-btn-0" class="btn-game btn-active px-3 py-1 text-xs rounded">CAM1</button>
                <button onclick="switchCam(1)" id="cam-btn-1" class="btn-game px-3 py-1 text-xs rounded">CAM2</button>
                <button onclick="switchCam(2)" id="cam-btn-2" class="btn-game px-3 py-1 text-xs rounded">CAM3</button>
            </div>
        </div>
    </div>

    <!-- 監控螢幕區域 -->
    <div class="flex-grow flex items-center justify-center bg-black relative p-4">
        <div id="camera-display" class="camera-feed w-full max-w-5xl aspect-video rounded-xl border-4 border-zinc-800 relative overflow-hidden">
            <!-- 鏡頭標籤 -->
            <div class="absolute top-6 left-6 bg-green-900/90 px-4 py-1 text-sm z-20 font-bold border border-green-400">
                LIVE FEED: <span id="cam-label">CAM 01</span>
            </div>

            <div id="monster-layer" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300 pointer-events-none">
                <svg viewBox="0 0 100 100" class="w-64 h-64">
                    <path d="M50 20 L85 90 L15 90 Z" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="2" />
                    <circle cx="40" cy="50" r="4" fill="red" class="animate-pulse" />
                    <circle cx="60" cy="50" r="4" fill="red" class="animate-pulse" />
                    <path d="M35 75 Q50 85 65 75" stroke="#400" stroke-width="2" fill="none" />
                </svg>
            </div>

            <!-- 雪花/雜訊效果 -->
            <div id="static-noise" class="absolute inset-0 bg-[url('https://media.giphy.com/media/oEI9uWUicG3vO/giphy.gif')] bg-cover opacity-10 pointer-events-none"></div>
            
            <!-- 門口警告動畫 -->
            <div id="door-warning" class="absolute inset-0 pointer-events-none hidden flex items-center justify-center z-30">
                <div class="bg-red-600 text-white px-8 py-4 text-3xl font-bold animate-bounce border-4 border-white shadow-2xl">
                    ⚠️ 偵測到門口有不明物體 ⚠️
                </div>
            </div>
        </div>
    </div>

    <!-- 底部狀態列 -->
    <div class="h-12 border-t border-zinc-900 bg-black flex items-center px-6 text-[10px] text-zinc-600 gap-4">
        <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> REC</div>
        <div>STATION: SITE-04</div>
        <div class="flex-grow"></div>
        <div id="status-log">系統正常執行中...</div>
    </div>
</div>

<div id="tutorial-screen" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-zinc-900 border-2 border-green-500 p-8 rounded-xl shadow-2xl">
        <h1 class="text-4xl text-green-500 mb-6 font-bold text-center tracking-widest">深夜值勤指引</h1>
        
        <div id="step-1" class="tutorial-step">
            <div class="bg-green-900/20 p-4 border-l-4 border-green-500 mb-6">
                <h2 class="text-xl text-white mb-2 font-bold">1. 掌握位置 (切換監控)</h2>
                <p class="text-zinc-400">使用右上角的 <span class="text-green-400 font-bold">CAM1-3</span> 切換鏡頭。那樣東西會從遠處逐漸靠近你的辦公室。</p>
            </div>
            <button onclick="nextStep(2)" class="w-full bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-500 transition-all text-lg">下一步</button>
        </div>

        <div id="step-2" class="tutorial-step hidden">
            <div class="bg-red-900/20 p-4 border-l-4 border-red-500 mb-6">
                <h2 class="text-xl text-white mb-2 font-bold">2. 緊急防禦 (點擊大門)</h2>
                <p class="text-zinc-400">當你在 <span class="text-red-400 font-bold">CAM3 (門口)</span> 看到影子或收到警告時，立即點擊上方正中間的 <span class="text-red-500 font-bold">「大門」按鈕</span>。關閉後大門會變紅。</p>
            </div>
            <button onclick="nextStep(3)" class="w-full bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-500 transition-all text-lg">最後一步</button>
        </div>

        <div id="step-3" class="tutorial-step hidden">
            <div class="bg-yellow-900/20 p-4 border-l-4 border-yellow-500 mb-6">
                <h2 class="text-xl text-white mb-2 font-bold">3. 資源管理</h2>
                <p class="text-zinc-400 leading-relaxed">電力是有限的！<span class="text-yellow-500">關閉大門</span> 會導致電力消耗爆增。只有在必要時才關門。撐到早上 6 點即獲勝。</p>
            </div>
            <button onclick="startGame()" class="w-full bg-green-500 text-black py-5 rounded-lg font-bold text-2xl hover:bg-white transition-all shadow-lg uppercase tracking-tighter">開始第一晚班次</button>
        </div>
    </div>
</div>

<!-- 驚嚇畫面 -->
<div id="jumpscare">
    <svg class="w-full h-full animate-ping" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="#1a0000" />
        <circle cx="35" cy="40" r="15" fill="red" />
        <circle cx="65" cy="40" r="15" fill="red" />
        <path d="M20 70 Q50 95 80 70" stroke="white" stroke-width="6" fill="none" />
        <rect x="30" y="70" width="8" height="15" fill="white" />
        <rect x="62" y="70" width="8" height="15" fill="white" />
    </svg>
</div>

<!-- 遊戲結束/結算 -->
<div id="end-screen" class="fixed inset-0 bg-black z-[60] hidden flex flex-col items-center justify-center text-center p-6">
    <h2 id="end-status" class="text-8xl font-black mb-6 text-red-600 uppercase tracking-tighter">死亡</h2>
    <p id="end-msg" class="text-2xl text-zinc-500 mb-12 max-w-md"></p>
    <button onclick="location.reload()" class="px-16 py-5 border-4 border-green-500 text-green-500 hover:bg-green-500 hover:text-black transition-all rounded-full font-bold text-xl uppercase tracking-widest">重新應徵</button>
</div>

<script>
const state = {
    power: 100,
    time: 0,
    currentCam: 0,
    doorClosed: false,
    monsterPos: 0, // 0: 遠, 1: 走廊, 2: 門口, 3: 進入
    active: false,
    usage: 1
};

let gameInterval, monsterInterval, timeInterval;
let synth, bgNoise;

function nextStep(step) {
    document.querySelectorAll('.tutorial-step').forEach(el => el.classList.add('hidden'));
    document.getElementById(`step-${step}`).classList.remove('hidden');
}

function startGame() {
    synth = new Tone.PolySynth(Tone.Synth).toDestination();
    bgNoise = new Tone.Noise("brown").toDestination();
    bgNoise.volume.value = -30;
    
    Tone.start();
    bgNoise.start();

    document.getElementById('tutorial-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    
    state.active = true;
    gameInterval = setInterval(processLogic, 1000);
    startMonsterAI();
    timeInterval = setInterval(updateClock, 45000); // 一小時約 45 秒
}

function processLogic() {
    if (!state.active) return;

    state.usage = 1;
    if (state.doorClosed) state.usage += 4; // 關門耗電極快
    
    state.power -= (state.usage * 0.45);
    
    if (state.power <= 0) {
        state.power = 0;
        gameOver("電力耗盡。大門在黑暗中自動彈開了...");
    }
    
    updateUI();
}

function startMonsterAI() {
    const move = () => {
        if (!state.active) return;
        
        const delay = 4000 + Math.random() * 6000;
        setTimeout(() => {
            if (!state.active) return;

            if (state.monsterPos < 2) {
                state.monsterPos++;
                flashStatic();
                log("偵測到 CAM0" + (state.monsterPos + 1) + " 有熱源移動...");
            } else if (state.monsterPos === 2) {
                if (state.doorClosed) {
                    state.monsterPos = 0; // 被擋住
                    playEffect("clang");
                    log("大門攔截了不明威脅。");
                    flashStatic();
                } else {
                    state.monsterPos = 3;
                    triggerJumpscare();
                }
            }
            updateUI();
            move();
        }, delay);
    };
    move();
}

function updateUI() {
    document.getElementById('power').innerText = Math.floor(state.power);
    document.getElementById('clock').innerText = `${state.time === 0 ? 12 : state.time}:00 AM`;
    
    const bars = "▶".repeat(state.usage);
    document.getElementById('usage-bars').innerText = bars;
    document.getElementById('usage-bars').className = state.usage > 1 ? 'text-red-500 font-black' : 'text-white font-bold';

    const monsterLayer = document.getElementById('monster-layer');
    const warning = document.getElementById('door-warning');
    const display = document.getElementById('camera-display');

    if (state.monsterPos === state.currentCam) {
        monsterLayer.style.opacity = "1";
    } else {
        monsterLayer.style.opacity = "0";
    }

    if (state.monsterPos === 2) {
        display.classList.add('danger-flash');
        warning.classList.remove('hidden');
    } else {
        display.classList.remove('danger-flash');
        warning.classList.add('hidden');
    }
}

function switchCam(id) {
    if (!state.active) return;
    state.currentCam = id;
    
    for(let i=0; i<3; i++) {
        document.getElementById(`cam-btn-${i}`).classList.toggle('btn-active', i === id);
    }
    
    document.getElementById('cam-label').innerText = `CAM 0${id + 1}`;
    flashStatic();
    playEffect("beep");
    updateUI();
}

function toggleDoor() {
    if (!state.active || state.power <= 0) return;
    state.doorClosed = !state.doorClosed;
    
    const btn = document.getElementById('door-btn');
    if (state.doorClosed) {
        btn.innerText = "大門：已關閉 (消耗中)";
        btn.classList.add('active');
        playEffect("door-close");
    } else {
        btn.innerText = "大門：開啟中";
        btn.classList.remove('active');
        playEffect("door-open");
    }
    updateUI();
}

function log(msg) {
    document.getElementById('status-log').innerText = msg;
}

function flashStatic() {
    const noise = document.getElementById('static-noise');
    noise.style.opacity = "0.7";
    setTimeout(() => noise.style.opacity = "0.1", 150);
}

function playEffect(type) {
    if (!synth) return;
    if (type === "beep") synth.triggerAttackRelease("B4", "0.02s");
    if (type === "door-close") synth.triggerAttackRelease("E1", "0.4s");
    if (type === "door-open") synth.triggerAttackRelease("B1", "0.3s");
    if (type === "clang") synth.triggerAttackRelease(["C2", "C3"], "0.5s");
}

function updateClock() {
    state.time++;
    if (state.time >= 6) winGame();
    updateUI();
}

function triggerJumpscare() {
    state.active = false;
    document.getElementById('jumpscare').style.display = 'flex';
    
    const scream = new Tone.NoiseSynth({
        noise: { type: "white" },
        envelope: { attack: 0.001, decay: 2, sustain: 0 }
    }).toDestination();
    scream.triggerAttackRelease("1n");

    setTimeout(() => {
        document.getElementById('jumpscare').style.display = 'none';
        gameOver("你沒有及時關上那道門...");
    }, 1500);
}

function gameOver(msg) {
    state.active = false;
    bgNoise.stop();
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('end-status').innerText = "死亡";
    document.getElementById('end-status').className = "text-8xl font-black mb-6 text-red-600 uppercase tracking-tighter";
    document.getElementById('end-msg').innerText = msg;
}

function winGame() {
    state.active = false;
    bgNoise.stop();
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('end-status').innerText = "生存成功";
    document.getElementById('end-status').className = "text-8xl font-black mb-6 text-green-500 uppercase tracking-tighter";
    document.getElementById('end-msg').innerText = "早上 6:00。太陽升起，那樣東西消失在陰影中。你活下來了。";
}
</script>
</body>
</html>
